<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineTrack | Login</title>

    <link rel="stylesheet" href="login and sign up.css">
</head>
<body>

<div class="container">

    <div class="form-box">

        <h1>🎬 CINETRACK</h1>

        <div class="tabs">
            <button class="active">Login</button>
            <button onclick="location.href='signup.html'">Sign Up</button>
        </div>

        <form id="loginForm">

            <input
                type="email"
                id="loginEmail"
                placeholder="Email Address"
                required
            >

            <input
                type="password"
                id="loginPassword"
                placeholder="Password"
                required
            >

            <button
                type="submit"
                class="submit-btn">
                Login
            </button>

        </form>

        <div class="row">

            <label class="checkbox">
                <input type="checkbox">
                Remember Me
            </label>

            <a href="#">Forgot Password?</a>

        </div>

        <div class="switch">
            Don't have an account?

            <a href="signup.html">
                Create One
            </a>
            

        </div>

    </div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
